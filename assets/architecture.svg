<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">
  <defs>
    <radialGradient id="sun" cx="0.4" cy="0.35">
      <stop offset="0" stop-color="#fdba74"/>
      <stop offset="0.55" stop-color="#f97316"/>
      <stop offset="1" stop-color="#c2410c"/>
    </radialGradient>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#8b949e"/>
    </marker>
    <marker id="arrO" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="900" height="460" rx="12" fill="#0d1117" stroke="#30363d"/>

  <!-- starfield -->
  <g fill="#e6edf3">
    <circle cx="60" cy="50" r="1.2" opacity=".5"/><circle cx="140" cy="390" r="1" opacity=".3"/>
    <circle cx="230" cy="60" r="1.4" opacity=".4"/><circle cx="330" cy="420" r="1" opacity=".35"/>
    <circle cx="420" cy="40" r="1" opacity=".5"/><circle cx="530" cy="425" r="1.3" opacity=".3"/>
    <circle cx="640" cy="55" r="1" opacity=".45"/><circle cx="750" cy="400" r="1.2" opacity=".35"/>
    <circle cx="830" cy="80" r="1.4" opacity=".5"/><circle cx="870" cy="300" r="1" opacity=".3"/>
    <circle cx="90" cy="200" r="1" opacity=".35"/><circle cx="805" cy="215" r="1" opacity=".4"/>
    <circle cx="500" cy="90" r="1" opacity=".3"/><circle cx="380" cy="390" r="1.2" opacity=".4"/>
    <circle cx="42" cy="330" r="1.3" opacity=".4"/><circle cx="695" cy="330" r="1" opacity=".3"/>
  </g>

  <!-- orbits -->
  <ellipse cx="450" cy="230" rx="165" ry="100" fill="none" stroke="#30363d" stroke-dasharray="3 5"/>
  <ellipse cx="450" cy="230" rx="300" ry="180" fill="none" stroke="#21262d" stroke-dasharray="3 7"/>

  <!-- the sun: the index -->
  <circle cx="450" cy="230" r="40" fill="url(#sun)"/>
  <text x="450" y="226" text-anchor="middle" fill="#0d1117" font-weight="700">index.db</text>
  <text x="450" y="241" text-anchor="middle" fill="#7c2d12" font-size="10">SQLite FTS5</text>

  <!-- inner orbit: the three memory sources -->
  <circle cx="300" cy="185" r="15" fill="#60a5fa"/>
  <text x="300" y="158" text-anchor="middle" fill="#60a5fa">transcripts</text>
  <text x="300" y="145" text-anchor="middle" fill="#8b949e" font-size="10">~/.claude/projects/**.jsonl</text>
  <line x1="314" y1="191" x2="409" y2="222" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)" opacity=".7"/>

  <circle cx="505" cy="322" r="11" fill="#34d399"/>
  <text x="505" y="350" text-anchor="middle" fill="#34d399">memory notes</text>
  <line x1="497" y1="313" x2="465" y2="266" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)" opacity=".7"/>

  <circle cx="560" cy="150" r="11" fill="#c084fc"/>
  <text x="560" y="127" text-anchor="middle" fill="#c084fc">wiki [[pages]]</text>
  <line x1="550" y1="158" x2="486" y2="205" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)" opacity=".7"/>

  <!-- outer orbit: the code moon (optional) -->
  <circle cx="718" cy="150" r="13" fill="none" stroke="#22d3ee" stroke-dasharray="2 3"/>
  <circle cx="718" cy="150" r="8" fill="#22d3ee"/>
  <text x="718" y="121" text-anchor="middle" fill="#22d3ee">code graph</text>
  <text x="718" y="177" text-anchor="middle" fill="#8b949e" font-size="10">graphify-out/graph.json · optional</text>
  <line x1="705" y1="157" x2="494" y2="222" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2 4" marker-end="url(#arr)" opacity=".6"/>

  <!-- comets: the hooks -->
  <g opacity=".9">
    <line x1="120" y1="315" x2="163" y2="298" stroke="#f97316" stroke-width="1" opacity=".3"/>
    <line x1="130" y1="309" x2="167" y2="296" stroke="#f97316" stroke-width="1" opacity=".5"/>
    <circle cx="172" cy="294" r="5" fill="#f97316"/>
    <text x="185" y="298" fill="#8b949e">Stop hook → <tspan fill="#e6edf3">cml index</tspan> · 17 ms</text>
  </g>
  <g opacity=".9">
    <line x1="105" y1="112" x2="148" y2="122" stroke="#fb923c" stroke-width="1" opacity=".3"/>
    <line x1="115" y1="114" x2="152" y2="123" stroke="#fb923c" stroke-width="1" opacity=".5"/>
    <circle cx="157" cy="124" r="5" fill="#fb923c"/>
    <text x="170" y="128" fill="#8b949e">Stop hook → <tspan fill="#e6edf3">cml capture</tspan> → inbox</text>
  </g>

  <!-- the beam out: search -->
  <line x1="487" y1="248" x2="676" y2="374" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>
  <text x="688" y="380" fill="#e6edf3"><tspan fill="#f97316">cml search</tspan> → recall</text>
  <text x="688" y="396" fill="#8b949e" font-size="10">milliseconds · 0 tokens</text>

  <!-- footer note -->
  <text x="450" y="440" text-anchor="middle" fill="#484f58" font-size="10">no daemons anywhere in this picture — the binary runs on a hook and exits</text>
</svg>
