name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: cml-linux-x86_64
          - os: macos-latest
            asset: cml-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # curl is a RUNTIME dependency only — distill exec's the curl binary rather than
      # linking libcurl, same as the original. No -dev package needed for it.
      - name: Install deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsqlite3-dev libsimdjson-dev
      - name: Install deps (macos)
        if: runner.os == 'macOS'
        run: brew install cmake sqlite simdjson
      - name: Build
        # macOS: brew's include/lib dirs aren't in clang's default search path, and
        # sqlite is keg-only — without the prefix path CMake compiles against the
        # SDK's sqlite3.h, which forbids sqlite3_auto_extension (breaks sqlite-vec).
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export CMAKE_PREFIX_PATH="$(brew --prefix simdjson);$(brew --prefix sqlite)"
          fi
          cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release && cmake --build cpp/build -j
      - name: Self-test
        run: ./cpp/build/cml_selftest
      - name: Rename asset
        run: cp cpp/build/cml ${{ matrix.asset }}
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --clobber || gh release create "${{ github.ref_name }}" "${{ matrix.asset }}" --title "${{ github.ref_name }}" --generate-notes
