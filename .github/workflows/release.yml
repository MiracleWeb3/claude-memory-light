name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: cml-linux-x86_64
          - os: macos-latest
            asset: cml-darwin-arm64
          - os: macos-13
            asset: cml-darwin-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Rename asset
        run: cp target/release/cml ${{ matrix.asset }}
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --clobber || gh release create "${{ github.ref_name }}" "${{ matrix.asset }}" --title "${{ github.ref_name }}" --generate-notes
