<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>cml — memory core</title>
<style>
  :root {
    --bg: #060407; --panel: #12080a; --panel2: #1a0c0f; --border: #3a1418;
    --ink: #f5e9e9; --ink2: #b3a0a0; --faint: #8a7676;
    --accent: #ef4444; --accent2: #22d3ee; --ok: #34d399;
    --z-label: 6; --z-hud: 10; --z-detail: 20; --z-boot: 100;
    --ease: cubic-bezier(.16,.84,.28,1);
  }
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--ink); font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; overflow: hidden; }
  #stars, #vig { position: fixed; inset: 0; pointer-events: none; }
  #vig { z-index: 4; background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.5) 100%); }
  #graph { position: fixed; inset: 0; }
  #graph canvas { display: block; }

  .panel { position: fixed; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }

  /* breadcrumb bar — you always know where you are */
  #crumbbar {
    top: 16px; left: 50%; transform: translateX(-50%); z-index: var(--z-hud);
    display: flex; align-items: center; gap: 10px; padding: 8px 14px;
  }
  #back {
    cursor: pointer; color: var(--ink2); border: 1px solid var(--border); border-radius: 7px;
    padding: 2px 9px; transition: color .15s, border-color .15s;
  }
  #back:hover { color: var(--ink); border-color: var(--accent); }
  #back:focus-visible, .btn:focus-visible, .crumb:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #crumbs { display: flex; align-items: center; gap: 8px; }
  .crumb { color: var(--ink2); cursor: pointer; transition: color .15s; }
  .crumb:hover { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
  .crumb.here { color: var(--ink); cursor: default; font-weight: 600; }
  .crumb.here:hover { text-decoration: none; }
  .sep { color: #6e4a4a; }

  #hud { top: 16px; left: 16px; width: 316px; z-index: var(--z-hud); padding: 14px 16px;
    animation: slidein .45s var(--ease) both .15s; }
  #hud h1 { font-size: 19px; letter-spacing: .4px; }
  #hud h1 b { color: var(--accent); }
  #status { display: flex; align-items: center; gap: 7px; color: var(--ink2); font-size: 11px; margin-top: 4px; letter-spacing: .7px; }
  #status .led { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.8s ease-in-out infinite; }
  #fps { margin-left: auto; color: var(--faint); }
  #stats { color: var(--ink2); font-size: 12px; margin: 8px 0; }
  #stats b { color: var(--ink); font-weight: 600; }
  #readout { color: #f0a2a2; font-size: 11px; min-height: 15px; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #qrow { display: flex; gap: 6px; align-items: center; }
  #q {
    flex: 1; background: #0a0507; border: 1px solid var(--border); border-radius: 8px;
    color: var(--ink); padding: 8px 10px; font: inherit; outline: none; transition: border-color .15s;
  }
  #q::placeholder { color: var(--faint); }
  #q:focus-visible { border-color: var(--accent); }
  .mbtn { cursor: pointer; color: var(--ink2); border: 1px solid var(--border); border-radius: 7px; padding: 5px 8px; transition: color .15s, border-color .15s; user-select: none; }
  .mbtn:hover { color: var(--ink); border-color: var(--accent); }
  #mcount { color: var(--accent2); font-size: 11px; min-width: 42px; text-align: center; }
  #projnav { margin-top: 10px; display: flex; flex-direction: column; gap: 3px; max-height: 150px; overflow: auto; }
  .pn {
    display: flex; justify-content: space-between; gap: 8px; padding: 3px 8px; border-radius: 6px;
    cursor: pointer; color: var(--ink2); font-size: 11.5px; border: 1px solid transparent;
    transition: color .15s, border-color .15s, background .15s;
  }
  .pn:hover { color: var(--ink); border-color: var(--border); background: var(--panel2); }
  .pn .n { color: var(--faint); }
  #chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip {
    border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px; font-size: 10.5px;
    cursor: pointer; user-select: none; color: var(--ink2); transition: all .18s var(--ease);
  }
  .chip:hover { border-color: var(--faint); }
  .chip.on { color: #060407; font-weight: 600; }
  .chip[data-g="user"].on { background: #fb923c; }
  .chip[data-g="assistant"].on { background: #60a5fa; }
  .chip[data-g="summary"].on { background: #94a3b8; }
  .chip[data-g="memory"].on { background: #34d399; }
  .chip[data-g="wiki"].on { background: #c084fc; }
  .chip[data-g="code"].on { background: #22d3ee; }
  #btns { display: flex; gap: 6px; margin-top: 10px; }
  .btn {
    flex: 1; text-align: center; border: 1px solid var(--border); border-radius: 8px; padding: 5px 0;
    cursor: pointer; color: var(--ink2); font-size: 12px; transition: color .15s, border-color .15s;
  }
  .btn:hover { color: var(--ink); border-color: var(--accent); }
  #hint { color: var(--faint); font-size: 10.5px; margin-top: 10px; letter-spacing: .3px; }
  kbd { border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 4px; padding: 0 4px; font-size: 10px; color: var(--ink2); }

  .plabel {
    position: fixed; left: 0; top: 0; z-index: var(--z-label); cursor: pointer;
    font-size: 11px; letter-spacing: .5px; color: #fbbf24;
    padding: 1px 7px; border: 1px solid rgba(245,158,11,.4); border-radius: 999px;
    background: rgba(10,6,4,.85); transition: color .15s, border-color .15s; will-change: transform;
  }
  .plabel:hover { color: #fde68a; border-color: #f59e0b; }
  .plabel.codeL { color: #67e8f9; border-color: rgba(34,211,238,.45); }

  /* detail: a fixed, calm reading panel — nothing floats over the brain */
  #detail {
    top: 16px; right: 16px; bottom: 16px; width: 380px; z-index: var(--z-detail);
    padding: 16px; display: flex; flex-direction: column; gap: 10px;
    transform: translateX(16px); opacity: 0; visibility: hidden;
    transition: transform .2s var(--ease), opacity .18s, visibility .2s;
  }
  #detail.show { transform: none; opacity: 1; visibility: visible; }
  #d-close { position: absolute; top: 10px; right: 12px; cursor: pointer; color: var(--ink2); transition: color .15s; }
  #d-close:hover { color: var(--ink); }
  #d-role { align-self: flex-start; border-radius: 5px; padding: 1px 8px; font-size: 10.5px; font-weight: 700; color: #060407; }
  #d-meta { color: var(--ink2); font-size: 12px; }
  #d-txt { flex: 1; overflow: auto; white-space: pre-wrap; word-break: break-word; font-size: 12.5px;
    background: #0a0507; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; max-width: 75ch; }
  #d-cmd { color: var(--ink2); font-size: 11px; }
  #d-cmd code { color: var(--ok); }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: var(--z-boot); flex-direction: column; gap: 24px;
    transition: opacity .5s ease, visibility .5s;
  }
  #loading.off { opacity: 0; visibility: hidden; }
  .ring { width: 72px; height: 72px; border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 58%, var(--accent) 92%, transparent 100%);
    -webkit-mask: radial-gradient(farthest-side, transparent 62%, #000 64%);
            mask: radial-gradient(farthest-side, transparent 62%, #000 64%);
    animation: spin 1s linear infinite;
  }
  #bootlog { color: var(--ink2); font-size: 12.5px; line-height: 1.9; min-height: 96px; min-width: 320px; }
  #bootlog .ok { color: var(--accent); }
  #bootlog .val { color: var(--ink); }
  #bootlog .pad { color: #4a2226; }
  #skip { color: var(--faint); font-size: 10.5px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 50% { opacity: .3; } }
  @keyframes slidein { from { opacity: 0; transform: translateX(-16px); } }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
<div id="stars"></div>
<div id="loading">
  <div class="ring"></div>
  <pre id="bootlog"></pre>
  <div id="skip">click to skip</div>
</div>
<div id="graph"></div>
<div id="vig"></div>

<div id="crumbbar" class="panel">
  <span id="back" style="display:none" tabindex="0">◂ back</span>
  <span id="crumbs"></span>
</div>

<div id="hud" class="panel">
  <h1>🧠 <b>cml</b> memory core</h1>
  <div id="status"><span class="led"></span><span>MEMORY CORE ONLINE</span><span id="fps"></span></div>
  <div id="stats"></div>
  <div id="readout"></div>
  <div id="qrow">
    <input id="q" placeholder="search memory…  ( / )"/>
    <span class="mbtn" id="mprev" title="previous match">◂</span>
    <span id="mcount"></span>
    <span class="mbtn" id="mnext" title="next match">▸</span>
  </div>
  <div id="projnav"></div>
  <div id="chips"></div>
  <div id="btns">
    <span class="btn" id="b-view" tabindex="0">⛶ overview</span>
    <span class="btn" id="b-sound" tabindex="0">🔊 sound</span>
  </div>
  <div id="hint"><kbd>drag</kbd> orbit · <kbd>right-drag</kbd> pan · <kbd>wheel</kbd> zoom to cursor · <kbd>click</kbd> enter / read · <kbd>Esc</kbd> back · <kbd>/</kbd> search</div>
</div>

<div id="detail" class="panel">
  <span id="d-close" tabindex="0">✕</span>
  <span id="d-role"></span>
  <div id="d-meta"></div>
  <div id="d-txt"></div>
  <div id="d-cmd"></div>
</div>

<script>
window.CML_GRAPH = /*%%PAYLOAD%%*/ null;
(function stars() {
  let a = "";
  for (let i = 0; i < 110; i++) a += `${(Math.random() * 100).toFixed(1)}vw ${(Math.random() * 105).toFixed(1)}vh 0 rgba(245,233,233,${(.08 + Math.random() * .25).toFixed(2)}),`;
  const st = document.createElement("style");
  st.textContent = `#stars::before{content:"";position:absolute;top:0;left:0;width:2px;height:2px;border-radius:50%;box-shadow:${a.slice(0, -1)}}`;
  document.head.appendChild(st);
})();
</script>
<script type="module">
/*%%THREE%%*/
/*%%APP%%*/
</script>
</body>
</html>
